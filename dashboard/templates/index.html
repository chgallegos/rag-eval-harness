<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RAG Evaluation Harness</title>
<style>
  :root {
    --bg: #0f1420; --panel: #171e2e; --panel2: #1d2639; --text: #e8ecf4;
    --muted: #8b95ab; --ok: #3ecf8e; --fail: #ff5470; --warn: #ffb454;
    --accent: #5b8cff; --border: #2a3550;
  }
  * { box-sizing: border-box; margin: 0; }
  body { background: var(--bg); color: var(--text);
         font: 15px/1.5 -apple-system, "Segoe UI", Roboto, sans-serif;
         max-width: 1080px; margin: 0 auto; padding: 32px 20px 80px; }
  h1 { font-size: 26px; }
  .sub { color: var(--muted); margin: 6px 0 28px; }
  .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
  select, button {
    background: var(--panel2); color: var(--text); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 16px; font-size: 15px; cursor: pointer;
  }
  button.primary { background: var(--accent); border-color: var(--accent); font-weight: 600; }
  button:disabled { opacity: .5; cursor: wait; }
  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
           gap: 12px; margin: 24px 0; }
  .card { background: var(--panel); border: 1px solid var(--border);
          border-radius: 12px; padding: 16px; }
  .card .dim { color: var(--muted); font-size: 13px; text-transform: uppercase;
               letter-spacing: .06em; }
  .card .score { font-size: 34px; font-weight: 700; margin-top: 4px; }
  .bar { height: 6px; background: var(--panel2); border-radius: 3px; margin-top: 10px; }
  .bar i { display: block; height: 100%; border-radius: 3px; background: var(--ok); }
  .panel { background: var(--panel); border: 1px solid var(--border);
           border-radius: 12px; padding: 20px; margin-top: 20px; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--border); }
  th { color: var(--muted); font-weight: 600; }
  .ok { color: var(--ok); font-weight: 600; }
  .fail { color: var(--fail); font-weight: 700; }
  .verdict { font-size: 18px; font-weight: 700; margin-top: 14px; }
  .pill { display: inline-block; padding: 2px 10px; border-radius: 999px;
          font-size: 12px; font-weight: 600; }
  .pill.ok { background: rgba(62,207,142,.15); }
  .pill.fail { background: rgba(255,84,112,.15); }
  details { margin-top: 8px; }
  summary { cursor: pointer; color: var(--muted); }
  .answer { color: var(--muted); font-size: 13px; margin: 4px 0 10px; }
  .hint { color: var(--muted); font-size: 13px; margin-top: 10px; }
  .spin { color: var(--warn); }
</style>
</head>
<body>
  <h1>RAG Evaluation Harness</h1>
  <p class="sub">20 golden cases &middot; five dimensions &middot; same code paths as CI.
     Pick a failure mode, run it, and diff against the clean baseline.</p>

  <div class="row">
    <label for="mode">Bot configuration:</label>
    <select id="mode">
      {% for m in failure_modes %}
      <option value="{{ m }}">{{ 'clean (no failure)' if m == 'none' else 'failure: ' + m }}</option>
      {% endfor %}
    </select>
    <button class="primary" id="runBtn" onclick="runEval()">Run evaluation</button>
    <button id="cmpBtn" onclick="compareRuns()" disabled>Compare vs baseline</button>
    <span id="status" class="hint"></span>
  </div>

  <div class="cards" id="cards"></div>
  <div id="gate"></div>
  <div class="panel" id="casesPanel" style="display:none">
    <h3>Per-case results</h3>
    <div id="cases"></div>
  </div>

<script>
let lastLabel = null, haveBaseline = false;
const fmt = x => (x === null || x === undefined) ? '-' : x.toFixed(2);

async function runEval() {
  const mode = document.getElementById('mode').value;
  const label = mode === 'none' ? 'baseline' : mode;
  setBusy(`running ${label}\u2026`);
  const res = await fetch('/api/run', {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({failure_mode: mode, label})
  });
  const report = await res.json();
  lastLabel = label;
  if (label === 'baseline') haveBaseline = true;
  document.getElementById('cmpBtn').disabled = !(haveBaseline && lastLabel !== 'baseline');
  renderCards(report);
  renderCases(report);
  document.getElementById('gate').innerHTML = '';
  setBusy('');
}

function renderCards(report) {
  const el = document.getElementById('cards');
  el.innerHTML = '';
  for (const [dim, score] of Object.entries(report.aggregate)) {
    const color = score >= 0.95 ? 'var(--ok)' : score >= 0.8 ? 'var(--warn)' : 'var(--fail)';
    el.insertAdjacentHTML('beforeend', `
      <div class="card"><div class="dim">${dim}</div>
        <div class="score" style="color:${color}">${score.toFixed(2)}</div>
        <div class="bar"><i style="width:${score*100}%;background:${color}"></i></div>
      </div>`);
  }
}

function renderCases(report) {
  const panel = document.getElementById('casesPanel');
  const el = document.getElementById('cases');
  panel.style.display = 'block';
  el.innerHTML = '';
  for (const c of report.cases) {
    const scores = Object.entries(c.scores)
      .map(([d, s]) => `<span class="pill ${s.score >= 0.95 ? 'ok' : 'fail'}">${d} ${s.score.toFixed(2)}</span>`)
      .join(' ');
    el.insertAdjacentHTML('beforeend', `
      <details><summary><b>${c.id}</b> [${c.category}] ${c.query} &nbsp; ${scores}</summary>
        <p class="answer">${c.answer}</p></details>`);
  }
}

async function compareRuns() {
  setBusy('comparing\u2026');
  const res = await fetch('/api/compare', {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({baseline: 'baseline', candidate: lastLabel})
  });
  const result = await res.json();
  if (result.error) { setBusy(result.error); return; }
  let rows = result.rows.map(r => `
    <tr><td>${r.dimension}</td><td>${fmt(r.baseline)}</td><td>${fmt(r.candidate)}</td>
        <td>${r.delta === null ? '-' : (r.delta >= 0 ? '+' : '') + r.delta.toFixed(4)}</td>
        <td>-${r.threshold.toFixed(2)}</td>
        <td class="${r.status === 'FAIL' ? 'fail' : 'ok'}">${r.status}</td></tr>`).join('');
  document.getElementById('gate').innerHTML = `
    <div class="panel"><h3>Regression gate: baseline vs ${lastLabel}</h3>
      <table><tr><th>dimension</th><th>baseline</th><th>candidate</th><th>delta</th><th>limit</th><th>status</th></tr>${rows}</table>
      <p class="verdict ${result.failed ? 'fail' : 'ok'}">
        ${result.failed ? 'REGRESSION DETECTED \u2014 do not ship' : 'No regression \u2014 clear to ship'}</p>
    </div>`;
  setBusy('');
}

function setBusy(msg) {
  document.getElementById('status').textContent = msg;
  document.getElementById('runBtn').disabled = !!msg && msg.includes('running');
}
</script>
</body>
</html>
