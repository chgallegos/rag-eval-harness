# Render deployment config. Create a new Web Service from this repo and
# Render picks this up automatically (or select "Use render.yaml").
services:
  - type: web
    name: rag-eval-harness
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt -r dashboard/requirements.txt
    startCommand: gunicorn --chdir dashboard app:app --bind 0.0.0.0:$PORT
